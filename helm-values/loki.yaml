deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 128Mi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

loki:
  useTestSchema: true
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

grafana:
  datasource:
    isDefault: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false
